name: MoonBit CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Update Registry Index
        run: moon update

      - name: Check
        run: moon check

      - name: Check Formatting
        run: moon fmt --check

      - name: Check Generated Interfaces
        run: |
          moon info
          git diff --exit-code

      - name: Build with Warnings Check (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          output=$(moon build 2>&1); echo "$output"
          warn_count=$(echo "$output" | grep -c 'warning' || true)
          echo "::notice title=Build Warnings::$warn_count warning(s)"
          [ "$warn_count" -eq 0 ] || { echo "::error title=Build Warnings::Found $warn_count warning(s)"; exit 1; }

      - name: Build with Warnings Check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = & moon build 2>&1
          $build_exit = $LASTEXITCODE
          $output | ForEach-Object { Write-Output $_ }
          if ($build_exit -ne 0) { exit $build_exit }
          $warn_count = [regex]::Matches(($output -join "`n"), "warning").Count
          Write-Output "::notice title=Build Warnings::$warn_count warning(s)"
          if ($warn_count -ne 0) {
            Write-Output "::error title=Build Warnings::Found $warn_count warning(s)"
            exit 1
          }

      - name: Build Wasm
        run: moon build --target wasm --release

      - name: Run Tests
        run: moon test

      - name: Code Line Count (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "=== Source Code Lines ==="
          core=$(find core combinators -name "*.mbt" ! -name "*_wbtest*" | xargs wc -l | tail -1)
          exporters=$(find exporters -name "*.mbt" | xargs wc -l | tail -1)
          importers=$(find importers -name "*.mbt" | xargs wc -l | tail -1)
          cli=$(find cmd examples -name "*.mbt" | xargs wc -l | tail -1)
          tests=$(find tests -name "*.mbt" | xargs wc -l | tail -1)
          root=$(find . -maxdepth 1 -name "*.mbt" | xargs wc -l | tail -1)
          total=$(( $(echo "$core" | awk '{print $1}') + $(echo "$exporters" | awk '{print $1}') + $(echo "$importers" | awk '{print $1}') + $(echo "$cli" | awk '{print $1}') + $(echo "$tests" | awk '{print $1}') + $(echo "$root" | awk '{print $1}') ))
          echo "  core/:           $core"
          echo "  exporters/:      $exporters"
          echo "  importers/:      $importers"
          echo "  cmd/ + examples/: $cli"
          echo "  tests/:          $tests"
          echo "  root:            $root"
          echo "  Total:           $total"
          echo "::notice title=Lines of Code::core: $core | exporters: $exporters | importers: $importers | tests: $tests"

      - name: Code Line Count (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Count-Lines($paths, $excludePattern = $null) {
            $files = @()
            foreach ($path in $paths) {
              $files += Get-ChildItem -Path $path -Recurse -Filter "*.mbt" -File
            }
            if ($excludePattern) {
              $files = $files | Where-Object { $_.Name -notlike $excludePattern }
            }
            $lines = 0
            foreach ($file in $files) {
              $lines += (Get-Content -Path $file.FullName).Count
            }
            return $lines
          }

          Write-Output "=== Source Code Lines ==="
          $core = Count-Lines @("core", "combinators") "*_wbtest*"
          $exporters = Count-Lines @("exporters")
          $importers = Count-Lines @("importers")
          $cli = Count-Lines @("cmd", "examples")
          $tests = Count-Lines @("tests")
          $root = (Get-ChildItem -Path . -Filter "*.mbt" -File | ForEach-Object { (Get-Content -Path $_.FullName).Count } | Measure-Object -Sum).Sum
          if ($null -eq $root) { $root = 0 }
          $total = $core + $exporters + $importers + $cli + $tests + $root
          Write-Output "  core/:            $core"
          Write-Output "  exporters/:       $exporters"
          Write-Output "  importers/:       $importers"
          Write-Output "  cmd/ + examples/: $cli"
          Write-Output "  tests/:           $tests"
          Write-Output "  root:             $root"
          Write-Output "  Total:            $total"
          Write-Output "::notice title=Lines of Code::core: $core | exporters: $exporters | importers: $importers | tests: $tests"

      - name: Coverage Analysis (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          moon coverage analyze > coverage_caret.log 2>&1
          core_only='^(core/)'
          core_report=$(moon coverage report -f summary 2>&1 | grep -E "$core_only")
          include_pattern='^(core/|exporters/|importers/|combinators/|tests/)'
          report=$(moon coverage report -f summary 2>&1 | grep -E "$include_pattern")
          echo "=== Per-File Coverage (covered / total) ==="
          echo "$report"
          echo ""
          core_total=$(echo "$core_report" | awk -F'[:/ ]+' '{c+=$(NF-1); t+=$NF} END{printf "%d/%d (%.1f%%)", c, t, 100*c/t}')
          echo "::notice title=Core Coverage::Core: $core_total"
          total=$(echo "$report" | awk -F'[:/ ]+' '{c+=$(NF-1); t+=$NF} END{printf "%d/%d (%.1f%%)", c, t, 100*c/t}')
          echo "::notice title=Coverage::Total: $total"

      - name: Coverage Analysis (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & moon coverage analyze *> coverage_caret.log
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning title=Coverage::moon coverage analyze is not available on Windows, skipping"
            Get-Content coverage_caret.log | ForEach-Object { Write-Output $_ }
            exit 0
          }

          function Sum-Coverage($lines) {
            $covered = 0
            $total = 0
            foreach ($line in $lines) {
              $numbers = [regex]::Matches($line, "\d+")
              if ($numbers.Count -ge 2) {
                $covered += [int]$numbers[$numbers.Count - 2].Value
                $total += [int]$numbers[$numbers.Count - 1].Value
              }
            }
            if ($total -eq 0) { return "0/0 (0.0%)" }
            return ("{0}/{1} ({2:N1}%)" -f $covered, $total, (100 * $covered / $total))
          }

          $summary = & moon coverage report -f summary 2>&1
          # Match lines starting with core/, core\ etc.
          $core_report = $summary | Select-String -Pattern "^core[\\/]" | ForEach-Object { $_.Line }
          $report = $summary | Select-String -Pattern "^(core|exporters|importers|combinators|tests)[\\/]" | ForEach-Object { $_.Line }
          Write-Output "=== Per-File Coverage (covered / total) ==="
          if ($report.Count -eq 0) {
            Write-Output "  (no matching files in coverage report)"
          } else {
            $report | ForEach-Object { Write-Output $_ }
          }
          Write-Output ""
          Write-Output "::notice title=Core Coverage::Core: $(Sum-Coverage $core_report)"
          Write-Output "::notice title=Coverage::Total: $(Sum-Coverage $report)"
