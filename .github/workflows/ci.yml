name: MoonBit CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Install Dependencies
        run: moon install

      - name: Check Formatting
        continue-on-error: true
        run: | 
          moon fmt
          moon fmt --check

      - name: Build with Warnings Check
        run: |
          output=$(moon build 2>&1); echo "$output"
          warn_count=$(echo "$output" | grep -c 'warning' || true)
          echo "::notice title=Build Warnings::$warn_count warning(s)"
          [ "$warn_count" -eq 0 ] || echo "::warning title=Build Warnings::Found $warn_count warning(s)"

      - name: Build Wasm
        run: moon build --target wasm --release

      - name: Run Tests
        run: moon test

      - name: Code Line Count
        run: |
          echo "=== Source Code Lines ==="
          core=$(find core combinators -name "*.mbt" ! -name "*_wbtest*" | xargs wc -l | tail -1)
          exporters=$(find exporters -name "*.mbt" | xargs wc -l | tail -1)
          importers=$(find importers -name "*.mbt" | xargs wc -l | tail -1)
          cli=$(find cmd examples -name "*.mbt" | xargs wc -l | tail -1)
          tests=$(find tests -name "*.mbt" | xargs wc -l | tail -1)
          root=$(find . -maxdepth 1 -name "*.mbt" | xargs wc -l | tail -1)
          total=$(( $(echo "$core" | awk '{print $1}') + $(echo "$exporters" | awk '{print $1}') + $(echo "$importers" | awk '{print $1}') + $(echo "$cli" | awk '{print $1}') + $(echo "$tests" | awk '{print $1}') + $(echo "$root" | awk '{print $1}') ))
          echo "  core/:           $core"
          echo "  exporters/:      $exporters"
          echo "  importers/:      $importers"
          echo "  cmd/ + examples/: $cli"
          echo "  tests/:          $tests"
          echo "  root:            $root"
          echo "  Total:           $total"
          echo "::notice title=Lines of Code::core: $core | exporters: $exporters | importers: $importers | tests: $tests"

      - name: Coverage Analysis
        run: |
          moon coverage analyze > coverage_caret.log 2>&1
          total_line=$(tail -1 coverage_caret.log)
          echo "$total_line"
          echo ""
          echo "=== Per-File Coverage (covered / total) ==="
          moon coverage report -f summary 2>&1
          echo ""
          echo "::notice title=Coverage::$total_line"
